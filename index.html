<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Gerenciador de OS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: #1E50A0;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #374151;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type=email],
    input[type=password],
    input[type=text] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    input:focus {
      border-color: #1E50A0;
      box-shadow: 0 0 0 3px rgba(30,80,160,0.12);
    }

    .toggle-pw {
      position: absolute;
      right: 10px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      color: #9ca3af;
      display: flex;
      align-items: center;
    }

    .toggle-pw:hover { color: #374151; }

    .btn {
      width: 100%;
      padding: 11px;
      background: #1E50A0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: .5rem;
    }

    .btn:hover { background: #174290; }
    .btn:active { background: #113278; transform: scale(.99); }
    .btn:disabled { background: #6B8FC0; cursor: not-allowed; }

    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
    }

    .alert-error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
    }

    .alert-success {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #86efac;
    }

    .result-box {
      margin-top: 1.5rem;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }

    .result-header {
      padding: 10px 14px;
      background: #f9fafb;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      border-bottom: 1px solid #e5e7eb;
    }

    .result-body {
      padding: 14px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: #1a1a1a;
      word-break: break-all;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .user-card {
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      color: #1E50A0;
      flex-shrink: 0;
    }

    .user-info p { font-size: 14px; font-weight: 600; color: #1a1a1a; }
    .user-info span { font-size: 12px; color: #6b7280; }

    .token-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 8px;
      background: #f0fdf4;
      color: #15803d;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .token-text {
      padding: 0 14px 12px;
      font-size: 11px;
      font-family: 'Courier New', monospace;
      color: #6b7280;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
      </div>
      <h1>Gerenciador de OS</h1>
      <p class="subtitle">Faça login para continuar</p>
    </div>

    <div class="alert alert-error" id="alertError"></div>
    <div class="alert alert-success" id="alertSuccess"></div>

    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <div class="input-wrap">
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" style="padding-right: 40px" />
        <button class="toggle-pw" id="togglePw" type="button" title="Mostrar/ocultar senha">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn" id="btnLogin">Entrar</button>

    <div class="result-box" id="resultBox">
      <div class="result-header" id="resultHeader">Resposta da API</div>
      <div id="resultBody"></div>
    </div>
  </div>

  <script>
    const URL_BASE = 'https://triumphant-clarity-production-264b.up.railway.app';

    const btnLogin    = document.getElementById('btnLogin');
    const alertError  = document.getElementById('alertError');
    const alertSuccess= document.getElementById('alertSuccess');
    const resultBox   = document.getElementById('resultBox');
    const resultHeader= document.getElementById('resultHeader');
    const resultBody  = document.getElementById('resultBody');

    document.getElementById('togglePw').addEventListener('click', () => {
      const s = document.getElementById('senha');
      const icon = document.getElementById('eyeIcon');
      if (s.type === 'password') {
        s.type = 'text';
        icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8
                   a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4
                   c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19
                   m-6.72-1.07a3 3 0 11-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        s.type = 'password';
        icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>`;
      }
    });

    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin();
    });
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('senha').focus();
    });

    function showError(msg) {
      alertError.textContent = msg;
      alertError.style.display = 'block';
      alertSuccess.style.display = 'none';
    }
    function showSuccess(msg) {
      alertSuccess.textContent = msg;
      alertSuccess.style.display = 'block';
      alertError.style.display = 'none';
    }
    function hideAlerts() {
      alertError.style.display = 'none';
      alertSuccess.style.display = 'none';
    }

    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      hideAlerts();
      resultBox.style.display = 'none';

      if (!email || !senha) {
        showError('Digite o e-mail e a senha.');
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Entrando...';

      try {
        const resp = await fetch(`${URL_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const text = await resp.text();
        let data = null;
        try { data = JSON.parse(text); } catch(e) {}

        resultBox.style.display = 'block';

        if (resp.ok && data) {
          showSuccess('Login realizado com sucesso!');
          resultHeader.textContent = `HTTP ${resp.status} — Login bem-sucedido`;
          const u = data.usuario || data.Usuario || {};
          const nome    = u.nome    || u.Nome    || 'Usuário';
          const emailR  = u.email   || u.Email   || email;
          const perfil  = u.perfil  || u.Perfil  || '';
          const setor   = u.setor   || u.Setor   || '';
          const token   = data.token || data.Token || '';  // ← declarada aqui

          // ← agora sim, token já existe:
          localStorage.setItem('os_token', token);
          localStorage.setItem('os_usuario', JSON.stringify(u));
          setTimeout(() => window.location.href = 'dashboard.html', 800);

          const initials = nome.split(' ').map(p => p[0]).join('').substring(0,2).toUpperCase();
          resultBody.innerHTML = `
            <div class="user-card">
              <div class="avatar">${initials}</div>
              <div class="user-info">
                <p>${nome}</p>
                <span>${emailR}${perfil ? ' · ' + perfil : ''}${setor ? ' · ' + setor : ''}</span>
                <div class="token-badge">Token JWT recebido</div>
              </div>
            </div>
            <div class="token-text">${token.substring(0, 80)}...</div>`;
        } else if (resp.status === 401) {
          showError('E-mail ou senha incorretos.');
          resultHeader.textContent = `HTTP 401 — Não autorizado`;
          resultBody.style.padding = '14px';
          resultBody.textContent = text || 'Credenciais inválidas.';

        } else {
          showError(`Erro da API: ${resp.status}`);
          resultHeader.textContent = `HTTP ${resp.status} — Erro no servidor`;
          resultBody.style.padding = '14px';
          resultBody.textContent = text || '(sem corpo na resposta)';
        }

      } catch (err) {
        showError(`Falha na conexão: ${err.message}`);
        resultBox.style.display = 'block';
        resultHeader.textContent = 'Erro de rede';
        resultBody.style.padding = '14px';
        resultBody.textContent = err.message;
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      }
    }

    btnLogin.addEventListener('click', fazerLogin);
  </script>

</body>
</html>
